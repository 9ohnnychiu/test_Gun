<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gun.js Glassmorphic CRUD</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden">
        <span id="toast-message">Notification</span>
    </div>

    <!-- Main Container -->
    <div class="app-container">
        
        <!-- Login Section -->
        <section id="login-section" class="glass-panel active">
            <div class="panel-header">
                <h2>Welcome Back</h2>
                <p>Sign in to access your secure data.</p>
            </div>
            <form id="auth-form" class="auth-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="e.g. testuser1" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="e.g. password123" required autocomplete="current-password">
                </div>
                <div class="action-buttons">
                    <button type="submit" id="btn-login" class="btn btn-primary">Log In</button>
                    <button type="button" id="btn-signup" class="btn btn-secondary">Sign Up</button>
                </div>
            </form>
            <div class="preset-hint">
                <p><strong>Test Account:</strong> testuser1 / password123</p>
            </div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section" class="glass-panel hidden">
            <div class="panel-header dashboard-header">
                <div>
                    <h2>Data Dashboard</h2>
                    <p>Logged in as <span id="current-user-display" class="highlight"></span></p>
                </div>
                <button id="btn-logout" class="btn btn-outline btn-sm">Log Out</button>
            </div>

            <div class="crud-controls">
                <form id="add-item-form" class="add-form">
                    <input type="text" id="new-item-input" placeholder="Enter new item here..." required>
                    <button type="submit" class="btn btn-primary btn-add">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </form>
            </div>

            <div class="items-container">
                <ul id="items-list" class="items-list">
                    <!-- Items will be injected here by app.js -->
                </ul>
                <div id="empty-state" class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    <p>No items yet. Add something above!</p>
                </div>
            </div>
        </section>

    </div>

    <!-- Gun Library CDN -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
